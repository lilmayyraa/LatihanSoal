<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Elektronik</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nav Bar -->
     <nav class="navbar">
    <div class="logo"> Toko Elektronik</div>

    <ul class="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">Produk</a></li>
        <li><a href="#">Transaksi</a></li>
    </ul>
</nav>
    <!-- Header -->
    <div class="header">
        <h1>Selamat Datang di Virly's Elektronik</h1>
        <p>Belanja hemat dengan potongan spesial untuk Anda</p>
    </div>

    <!-- Form -->
    <div class="container">
        <div class="card">

            <h2>Form Transaksi</h2>

            <label>Nama Pelanggan</label>
            <input type="text" id="namaPelanggan">

            <label>Nama Produk</label>
            <input type="text" id="namaProduk">

            <label>Harga Produk</label>
            <input type="number" id="hargaProduk">

            <label>Jumlah Pembelian</label>
            <input type="number" id="jumlahPembelian">

            <div class="button-group">
                <button class="btn-hitung" onclick="hitungBonus()">
                    Hitung
                </button>

                <button class="btn-reset" onclick="resetForm()">
                    Reset
                </button>
            </div>

            <!-- Output -->
            <div id="hasil" class="hasil">
                <h3>Hasil Transaksi</h3>

                <p>
                    <strong>Nama Pelanggan :</strong>
                    <span id="hasilNama"></span>
                </p>

                <p>
                    <strong>Nama Produk :</strong>
                    <span id="hasilProduk"></span>
                </p>

                <p>
                    <strong>Total Belanja :</strong>
                    <span id="hasilBelanja"></span>
                </p>

                <p>
                    <strong>Potongan :</strong>
                    <span id="hasilPotongan"></span>
                </p>

                <p>
                    <strong>Total Bayar :</strong>
                    <span id="hasilBayar"></span>
                </p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
